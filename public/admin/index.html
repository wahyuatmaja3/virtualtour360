<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - 360 Virtual Tour</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a; color: #f8fafc;
        }
        .container {
            max-width: 900px; margin: 40px auto; padding: 20px;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1, h2 { margin-top: 0; color: #38bdf8; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #cbd5e1; }
        input[type="text"], input[type="file"] {
            width: 100%; padding: 10px;
            background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; border-radius: 8px; font-family: 'Outfit', sans-serif;
        }
        button {
            background-color: #3b82f6; color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: background 0.3s;
        }
        button:hover { background-color: #2563eb; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        th { color: #94a3b8; }
        
        .alert { padding: 10px; border-radius: 8px; margin-bottom: 1rem; display: none; }
        .alert.success { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #4ade80; display: block; }
        .alert.error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Virtual Tour CMS</h1>
        
        <div id="messageBox" class="alert"></div>

        <div class="glass-panel">
            <h2>Add New Scene</h2>
            <form id="addSceneForm">
                <div class="form-group">
                    <label for="sceneId">Scene ID (no spaces, e.g., living_room)</label>
                    <input type="text" id="sceneId" name="id" required>
                </div>
                <div class="form-group">
                    <label for="sceneTitle">Display Title</label>
                    <input type="text" id="sceneTitle" name="title" required>
                </div>
                <div class="form-group">
                    <label for="panoramaFile">360° Panorama Image (.jpg/.png)</label>
                    <input type="file" id="panoramaFile" name="panorama" accept="image/*" required>
                </div>
                <button type="submit">Upload & Create Scene</button>
            </form>
        </div>

        <div class="glass-panel">
            <h2>Manage Scenes</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Image Path</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="scenesTableBody">
                    <tr><td colspan="4">Loading scenes...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div style="text-align: center; margin-top: 2rem;">
            <a href="/" style="color: #38bdf8; text-decoration: none;">&larr; Back to Virtual Tour</a>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
