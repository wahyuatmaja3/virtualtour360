<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Virtual Tour Experience</title>
    <meta name="description" content="Explore a stunning 360-degree virtual tour of our street location.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Pannellum CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <p>Loading Virtual Experience...</p>
    </div>

    <!-- Glassmorphism Header -->
    <header class="glass-header">
        <h1>Street View 360°</h1>
        <p>Drag to explore the environment</p>
    </header>

    <!-- Pannellum Viewer Container -->
    <div id="panorama"></div>

    <!-- Pannellum JS -->
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="script.js"></script>
</body>
</html>
